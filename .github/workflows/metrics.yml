name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lorelairaras
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Manila
          filename: github/metrics/output/metrics.svg

          # Isometric contribution calendar (full year)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages breakdown with byte sizes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8

          # Recent activity 
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_filter: push, pr, issue
          plugin_activity_visibility: public

          # Achievements 
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
        
          # Starred topics — shows your interests as topic pills
          plugin_topics: yes
          plugin_topics_mode: starred
          plugin_topics_limit: 15
          plugin_topics_sort: stars

          # Featured repositories — update this list as you add projects
          plugin_repositories: yes
          plugin_repositories_featured: lorelairaras/lorelairaras, lorelairaras/Portfolio
          # Add more as you build:
          # plugin_repositories_featured: lorelairaras/lorelairaras, lorelairaras/project-2, lorelairaras/project-3

          # Lines of code changed (shows your contribution volume)
          plugin_lines: yes