name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lorelairaras
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Manila
          filename: github/metrics/output/metrics.svg

          # Isometric contribution calendar (full year)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages breakdown with byte sizes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          
          # Featured repositories — update this list as you add projects
          plugin_repositories: yes
          plugin_repositories_featured: lorelairaras/lorelairaras, lorelairaras/Portfolio
          # Add more as you build:
          # plugin_repositories_featured: lorelairaras/lorelairaras, lorelairaras/project-2, lorelairaras/project-3

          # Lines of code changed (shows your contribution volume)
          plugin_lines: yes